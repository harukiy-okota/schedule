<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h2>タスク編集</h2>

<form method="POST">

  <input type="text"
         name="name"
         value="{{ task.name }}">
  
  <input type="number"                              
         name="hour"
         value="{{ task.end_hour }}"                    
         min="0"
         max="23">
  :
  <input type="number"  
         name="minute"
         value="{{ task.end_minute }}"
         min="0"  
         max="59">
  〜
  <input type="number"
         name="end_hour"
         value="{{ task.end_hour }}"
         min="0"
         max="23">
  :
  <input type="number"
         name="end_minute"
         value="{{ task.end_minute }}"
         min="0"
         max="59">


  <select name="color">
    <option value="#4da6ff">青</option>
    <option value="#ff6666">赤</option>
    <option value="#66cc66">緑</option>
    <option value="#ffcc66">オレンジ</option>
    <option value="#cc99ff">紫</option>
  </select>

  <button type="submit">
    保存
  </button>

  
  <br><br>
  
  <a href="/" class="back-btn">
    ← 戻る
  <a>


</form>

</body>
</html>
